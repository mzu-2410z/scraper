name: Schedsy Lead Ingestion (Texas)

on:
  workflow_dispatch: # Allows you to trigger this manually with one click

jobs:
  scrape-and-sanitize:
    runs-on: ubuntu-latest # This runner is physically located in a US Azure datacenter

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl

      - name: Execute Extraction Engine
        run: python texas_hunter.py

      - name: Upload Clean Leads Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Schedsy-Verified-Leads
          path: schedsy_leads_texas.xlsx
          retention-days: 5